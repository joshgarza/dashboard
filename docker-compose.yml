services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /mnt/c/Users/josh/OneDrive/Documents/Obsidian/Obsidian Vault:/mnt/c/Users/josh/OneDrive/Documents/Obsidian/Obsidian Vault:ro
      - /home/josh/coding/claude/research:/home/josh/coding/claude/research
      - /home/josh/.claude:/root/.claude
      - /home/josh/.claude.json:/root/.claude.json
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
