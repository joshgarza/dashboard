services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /mnt/c/Users/josh/OneDrive/Documents/Obsidian/Obsidian Vault:/mnt/c/Users/josh/OneDrive/Documents/Obsidian/Obsidian Vault
      - /home/josh/coding/claude/research:/home/josh/coding/claude/research
      - /home/josh/coding/claude/hopper-shared/data:/home/josh/coding/claude/hopper-shared/data
      - /home/josh/.claude:/home/node/.claude
    environment:
      - CLAUDE_CONFIG_DIR=/home/node/.claude
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    restart: unless-stopped
